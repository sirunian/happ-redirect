<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Redirecting...</title>

<script>
function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

window.onload = function () {
    let target = getParam("url");

    if (!target) {
        document.body.innerHTML = "Missing url";
        return;
    }

    try {
        target = decodeURIComponent(target);
    } catch (e) {}

    window.location.href = target;

    setTimeout(() => {
        document.getElementById("fallback").style.display = "block";
        document.getElementById("link").href = target;
        document.getElementById("link").innerText = target;
    }, 1200);
};
</script>

<style>
body { font-family: Arial; text-align: center; padding: 40px; }
#fallback { display: none; margin-top: 20px; }
a { word-break: break-all; }
</style>

</head>
<body>

<h2>Redirecting...</h2>

<div id="fallback">
    <p>If nothing happened:</p>
    <a id="link" href="#"></a>
</div>

</body>
</html>
